name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Test core
        working-directory: hashtime
        run: cargo test --release

      - name: Test CLI
        working-directory: hashtime-cli
        run: cargo test --release

  test-linux-set-birthtime:
    name: Test setting birthtime with debugfs on Linux
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Install debugfs
        run: sudo apt-get update && sudo apt-get install -y e2fsprogs

      - name: Test birthtime (requires root for debugfs)
        shell: sudo bash {0}
        working-directory: hashtime
        run: cargo test --release -- --ignored

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build docs
        run: cargo doc --no-deps --all
        env:
          RUSTDOCFLAGS: -D warnings

  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        working-directory: hashtime-cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            powershell -Command "Compress-Archive -Path hashtime.exe -DestinationPath hashtime-${{ matrix.target }}.zip"
          else
            tar -czf hashtime-${{ matrix.target }}.tar.gz hashtime
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/hashtime-${{ matrix.target }}.*

  build-wheel:
    name: Build Wheel (${{ matrix.os }}-py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: &python_wheel_matrix
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release -i python${{ matrix.python }}
          working-directory: hashtime-py

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: target/wheels/hashtime-*.whl

  test-python:
    name: Python Test (${{ matrix.os }}-py${{ matrix.python }})
    needs: build-wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: *python_wheel_matrix

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'

      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: Install pytest
        run: pip install pytest

      - name: Install wheel
        run: pip install --find-links dist hashtime

      - name: Run Python tests
        working-directory: hashtime-py
        run: pytest tests/
