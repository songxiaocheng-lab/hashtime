name: CD

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  # run-ci:
  #   uses: ./.github/workflows/ci.yml

  publish-crates:
    name: Publish to crates.io
    needs: run-ci
    runs-on: ubuntu-latest
    environment:
      name: crates-io
      url: https://crates.io/crates/hashtime

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Publish hashtime
        working-directory: hashtime
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} --index "https://dl.cloudsmith.io/public/sxc/hashtime/cargo/index.git"

      - name: Publish hashtime-cli
        working-directory: hashtime-cli
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} --index "https://dl.cloudsmith.io/public/sxc/hashtime/cargo/index.git"

  publish-pypi:
    name: Publish to PyPI
    needs: run-ci
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/hashtime/

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://python.cloudsmith.io/sxc/hashtime/

  publish-github:
    name: Publish to GitHub Release
    needs: run-ci
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Extract custom changelog
        id: custom_changelog
        uses: ffurrer2/extract-release-notes@v3
        with:
          changelog_file: CHANGELOG.md

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "previous=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          body: ${{ steps.changelog.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
