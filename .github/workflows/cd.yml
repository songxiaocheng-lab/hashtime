name: CD

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  run-ci:
    uses: ./.github/workflows/ci.yml

  publish-crates:
    name: Publish to crates.io
    needs: run-ci
    runs-on: ubuntu-latest
    environment:
      name: crates-io
      url: https://crates.io/crates/hashtime

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Cloudsmith registry
        run: |
          mkdir -p ~/.cargo
          printf '[registries.sxc-hashtime]\nindex = "https://dl.cloudsmith.io/basic/sxc/hashtime/cargo/index.git"\ntoken = ${{ secrets.CARGO_REGISTRY_TOKEN }}\n' > ~/.cargo/config.toml

      - name: Publish hashtime
        working-directory: hashtime
        run: cargo publish --registry sxc-hashtime

      - name: Publish hashtime-cli
        working-directory: hashtime-cli
        run: cargo publish --registry sxc-hashtime

